services:
  db:
    image: postgres:16-alpine
    container_name: grocery-pos-db
    environment:
      POSTGRES_DB: grocery_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/views.sql:/docker-entrypoint-initdb.d/02_views.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grocery_pos"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: grocery-pos-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:${FRONTEND_PORT:-5173}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: grocery_pos
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL: "false"
      JWT_SECRET: docker_dev_secret_change_me
      JWT_EXPIRES_IN: 1d
      BCRYPT_SALT_ROUNDS: 12
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: grocery-pos-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-5000}/api
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
