services:
  - type: web
    name: grocery-pos
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm --prefix backend ci && npm --prefix frontend ci && npm --prefix frontend run build
    startCommand: npm --prefix backend run start:render
    healthCheckPath: /health/db
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.11.1
      - key: VITE_API_BASE_URL
        value: /api
      - key: DATABASE_URL
        fromDatabase:
          name: grocery-pos-db
          property: connectionString
      - key: DB_SSL
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: BCRYPT_SALT_ROUNDS
        value: "12"

databases:
  - name: grocery-pos-db
    plan: free
    region: singapore
    databaseName: grocery_pos
    user: grocery_pos_user
    postgresMajorVersion: "16"
    ipAllowList: []
